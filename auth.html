<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - MY VIDEO HELPER</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            background: radial-gradient(circle at top right, #1a1a2e, #16213e);
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            overflow-y: auto;
            padding: 20px 0;
        }
        .auth-container {
            width: 100%;
            max-width: 450px;
            padding: 2rem;
            animation: slideIn 0.5s ease-out;
        }
        @keyframes slideIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .auth-card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
            padding: 2.5rem;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }
        .auth-logo {
            text-align: center;
            margin-bottom: 2rem;
            font-size: 1.8rem;
            font-weight: 800;
            color: #fff;
        }
        .auth-logo i { color: var(--accent); margin-right: 10px; }
        .auth-tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 2rem;
            background: rgba(0,0,0,0.2);
            padding: 5px;
            border-radius: 12px;
        }
        .auth-tab {
            flex: 1;
            padding: 10px;
            border-radius: 8px;
            text-align: center;
            cursor: pointer;
            font-size: 0.9rem;
            transition: all 0.3s;
            color: rgba(255,255,255,0.6);
        }
        .auth-tab.active {
            background: var(--accent);
            color: #fff;
            font-weight: 600;
            box-shadow: 0 4px 15px rgba(0, 229, 255, 0.3);
        }
        .form-group { margin-bottom: 1.2rem; }
        .form-group label { display: block; margin-bottom: 8px; font-size: 0.85rem; color: rgba(255,255,255,0.7); }
        .input-wrapper { position: relative; }
        .input-wrapper i { position: absolute; left: 15px; top: 15px; color: rgba(255,255,255,0.4); }
        .input-wrapper input {
            width: 100%;
            padding: 14px 14px 14px 45px;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 12px;
            color: #fff;
            font-family: inherit;
            transition: all 0.3s;
        }
        .input-wrapper input:focus {
            border-color: var(--accent);
            background: rgba(255,255,255,0.1);
            outline: none;
            box-shadow: 0 0 15px rgba(0, 229, 255, 0.1);
        }
        .pricing-select {
            width: 100%;
            padding: 12px;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 12px;
            color: #fff;
            margin-top: 5px;
        }
        .auth-btn {
            width: 100%;
            padding: 14px;
            border-radius: 12px;
            border: none;
            background: linear-gradient(45deg, var(--accent), #00a8ff);
            color: #fff;
            font-weight: 700;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 1rem;
        }
        .auth-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(0, 229, 255, 0.3);
        }
        .forgot-link {
            display: block;
            text-align: right;
            font-size: 0.8rem;
            color: var(--accent);
            margin-top: 10px;
            text-decoration: none;
        }
        .forgot-link:hover { text-decoration: underline; }
    </style>
</head>
<body>

    <div class="auth-container">
        <div class="auth-card">
            <div class="auth-logo"><i class="fa-solid fa-scissors"></i> VIDEO <span style="color:var(--accent)">HELPER</span></div>
            
            <div class="auth-tabs">
                <div class="auth-tab active" id="tab-login-btn">Login</div>
                <div class="auth-tab" id="tab-signup-btn">Sign Up</div>
            </div>

            <!-- LOGIN FORM -->
            <form id="login-form">
                <div class="form-group">
                    <label>Email Address</label>
                    <div class="input-wrapper">
                        <i class="fa-solid fa-envelope"></i>
                        <input type="email" id="login-email" placeholder="name@example.com" required>
                    </div>
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <div class="input-wrapper">
                        <i class="fa-solid fa-lock"></i>
                        <input type="password" id="login-pass" placeholder="••••••••" required>
                    </div>
                </div>
                <a href="#" class="forgot-link" id="btn-forgot-pass">Forgot Password?</a>
                <button type="submit" class="auth-btn">Sign In Now</button>
            </form>

            <!-- SIGNUP FORM -->
            <form id="signup-form" style="display:none;">
                <div class="form-group">
                    <label>Full Name</label>
                    <div class="input-wrapper">
                        <i class="fa-solid fa-user"></i>
                        <input type="text" id="signup-name" placeholder="John Doe" required>
                    </div>
                </div>
                <div class="form-group">
                    <label>Email Address</label>
                    <div class="input-wrapper">
                        <i class="fa-solid fa-envelope"></i>
                        <input type="email" id="signup-email" placeholder="name@example.com" required>
                    </div>
                </div>
                <div class="form-group">
                    <label>Phone Number</label>
                    <div style="display:flex; gap:5px;">
                        <input type="text" id="signup-country" placeholder="+92" style="width:70px;" class="glass-input" required>
                        <input type="text" id="signup-phone" placeholder="300 1234567" style="flex:1;" class="glass-input" required>
                    </div>
                </div>
                <div class="form-group">
                    <label>Date of Birth</label>
                    <div class="input-wrapper">
                        <i class="fa-solid fa-calendar"></i>
                        <input type="date" id="signup-dob" class="glass-input" required>
                    </div>
                    <p style="font-size:0.65rem; color:var(--accent); margin-top:5px;">User must be 18+ years old.</p>
                </div>
                <div class="form-group">
                    <label>Choose Plan</label>
                    <select class="pricing-select" id="signup-plan">
                        <!-- Loaded dynamically -->
                    </select>
                </div>
                <div class="form-group">
                    <label>Promo Code (Optional)</label>
                    <div class="input-wrapper">
                        <i class="fa-solid fa-tag"></i>
                        <input type="text" id="signup-promo" placeholder="Enter Code">
                    </div>
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <div class="input-wrapper">
                        <i class="fa-solid fa-lock"></i>
                        <input type="password" id="signup-pass" placeholder="••••••••" required>
                    </div>
                    <p style="font-size:0.65rem; color:rgba(255,255,255,0.4); margin-top:5px;">8+ chars, 1 Uppercase, 1 Number, 1 Special Char (@$!%*?&)</p>
                </div>
                <div class="form-group" style="background:rgba(255,255,255,0.05); padding:10px; border-radius:12px;">
                    <label style="color:var(--accent);"><i class="fa-solid fa-robot"></i> Anti-Bot Check</label>
                    <p style="font-size:0.8rem; margin-bottom:5px;">Solve: 3 + 4 = ?</p>
                    <input type="number" id="bot-shield-val" class="glass-input" placeholder="Result" required>
                </div>
                <div class="form-group" style="display:flex; gap:10px; align-items:flex-start; margin-top:1rem;">
                    <input type="checkbox" id="signup-agree" style="margin-top:5px;" required>
                    <label for="signup-agree" style="font-size:0.75rem; color:rgba(255,255,255,0.6); pointer-events:auto; cursor:pointer;">
                        I agree to the <span style="color:var(--accent)">Terms of Service</span> and <span style="color:var(--accent)">Privacy Policy</span>. I confirm that I am above 18 years of age.
                    </label>
                </div>
                <button type="submit" class="auth-btn" style="background:linear-gradient(45deg, #2ecc71, #27ae60)">Create Account</button>
            </form>

            <!-- FORGOT PASSWORD -->
            <div id="forgot-area" style="display:none; text-align:center;">
                <h3 style="color:#fff; margin-bottom:10px;">Reset Password</h3>
                <p style="font-size:0.8rem; color:rgba(255,255,255,0.5); margin-bottom:20px;">Enter your email to receive a reset link.</p>
                <div class="form-group">
                    <div class="input-wrapper">
                        <i class="fa-solid fa-envelope"></i>
                        <input type="email" id="forgot-email" placeholder="Your Email">
                    </div>
                </div>
                <button class="auth-btn" id="btn-send-reset">Send Reset Link</button>
                <a href="#" class="forgot-link" style="text-align:center; margin-top:15px;" id="back-to-login">Back to Login</a>
            </div>

        </div>
    </div>

    <script src="admin.js"></script>
    <script>
        // Tab Switching
        const loginTab = document.getElementById('tab-login-btn');
        const signupTab = document.getElementById('tab-signup-btn');
        const forgotArea = document.getElementById('forgot-area');

        // Note: loginForm and signupForm are already defined in admin.js

        loginTab.onclick = () => {
            loginTab.classList.add('active');
            signupTab.classList.remove('active');
            loginForm.style.display = 'block';
            signupForm.style.display = 'none';
            forgotArea.style.display = 'none';
        }

        signupTab.onclick = () => {
            signupTab.classList.add('active');
            loginTab.classList.remove('active');
            signupForm.style.display = 'block';
            loginForm.style.display = 'none';
            forgotArea.style.display = 'none';
        }

        document.getElementById('btn-forgot-pass').onclick = (e) => {
            e.preventDefault();
            loginForm.style.display = 'none';
            forgotArea.style.display = 'block';
        }

        document.getElementById('back-to-login').onclick = (e) => {
            e.preventDefault();
            forgotArea.style.display = 'none';
            loginForm.style.display = 'block';
        }

        // Load Plans Dynamically
        function loadSignupPlans() {
            const plans = JSON.parse(localStorage.getItem('helper_fee_plans') || '[]');
            const select = document.getElementById('signup-plan');
            if (select) {
                select.innerHTML = plans.map(p => `<option value="${p.id}">${p.name} - ${p.price} PKR (${p.days} Days)</option>`).join('');
            }
        }
        document.addEventListener('DOMContentLoaded', loadSignupPlans);
    </script>
</body>
</html>
