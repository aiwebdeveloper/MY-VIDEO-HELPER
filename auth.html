<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Get Started — NEXUS EDIT</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg-dark: #0f0814;
            --accent: #00e5ff;
            --panel-bg: rgba(255, 255, 255, 0.03);
            --transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        body {
            font-family: 'Outfit', sans-serif;
            background: var(--bg-dark);
            background-image: radial-gradient(circle at top right, #1a0b35, #0f0814);
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            color: #fff;
            padding: 40px 20px;
            overflow-x: hidden;
        }

        .auth-card {
            width: 100%;
            max-width: 480px;
            background: var(--panel-bg);
            backdrop-filter: blur(40px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 32px;
            padding: 48px;
            box-shadow: 0 40px 100px rgba(0, 0, 0, 0.5);
            animation: fadeIn 0.6s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .auth-logo {
            text-align: center;
            margin-bottom: 40px;
            font-size: 2rem;
            font-weight: 800;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
            letter-spacing: 1.5px;
        }

        .auth-logo span { color: var(--accent); }

        .auth-tabs {
            display: flex;
            background: rgba(255, 255, 255, 0.03);
            padding: 6px;
            border-radius: 16px;
            margin-bottom: 32px;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .auth-tab {
            flex: 1;
            padding: 12px;
            text-align: center;
            border-radius: 12px;
            cursor: pointer;
            font-weight: 600;
            font-size: 0.95rem;
            color: rgba(255, 255, 255, 0.4);
            transition: var(--transition);
        }

        .auth-tab.active {
            background: var(--accent);
            color: #000;
            box-shadow: 0 0 20px rgba(0, 229, 255, 0.3);
        }

        .form-group { margin-bottom: 24px; }
        .form-group label {
            display: block;
            margin-bottom: 10px;
            font-size: 0.85rem;
            font-weight: 600;
            color: rgba(255, 255, 255, 0.5);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .input-wrapper { position: relative; }
        .input-wrapper i {
            position: absolute;
            left: 18px;
            top: 50%;
            transform: translateY(-50%);
            color: rgba(255, 255, 255, 0.2);
            font-size: 1rem;
        }

        .input-wrapper input, .input-wrapper select {
            width: 100%;
            padding: 16px 16px 16px 52px;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 16px;
            color: #fff;
            font-family: inherit;
            font-size: 0.95rem;
            transition: var(--transition);
            box-sizing: border-box;
            outline: none;
        }

        .input-wrapper input:focus {
            border-color: var(--accent);
            background: rgba(255, 255, 255, 0.05);
            box-shadow: 0 0 20px rgba(0, 229, 255, 0.1);
        }

        .auth-btn {
            width: 100%;
            padding: 18px;
            border-radius: 16px;
            border: none;
            background: linear-gradient(135deg, var(--accent), #00a8ff);
            color: #000;
            font-weight: 800;
            font-size: 1rem;
            cursor: pointer;
            transition: var(--transition);
            margin-top: 10px;
            letter-spacing: 0.5px;
        }

        .auth-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 20px 40px rgba(0, 229, 255, 0.3);
        }

        .forgot-link {
            display: block;
            text-align: right;
            margin-top: 12px;
            font-size: 0.85rem;
            color: var(--accent);
            text-decoration: none;
            font-weight: 600;
        }

        /* Terms Checkbox */
        .terms-row {
            display: flex;
            gap: 12px;
            align-items: flex-start;
            margin-top: 24px;
        }

        .terms-row input[type="checkbox"] {
            width: 20px;
            height: 20px;
            accent-color: var(--accent);
            margin-top: 2px;
        }

        .terms-row label {
            font-size: 0.8rem;
            color: rgba(255, 255, 255, 0.5);
            line-height: 1.5;
        }

        .terms-row span { color: var(--accent); font-weight: 600; cursor: pointer; }

        .anti-bot-box {
            background: rgba(0, 229, 255, 0.03);
            border: 1px solid rgba(0, 229, 255, 0.1);
            border-radius: 16px;
            padding: 16px;
            margin-bottom: 24px;
        }
    </style>
</head>
<body>

    <div class="auth-card">
        <div class="auth-logo">
            <i class="fa-solid fa-cube" style="color:var(--accent)"></i>
            NEXUS <span>EDIT</span>
        </div>

        <div class="auth-tabs">
            <div class="auth-tab active" id="tab-login-btn">LOGIN</div>
            <div class="auth-tab" id="tab-signup-btn">CREATE ACCOUNT</div>
        </div>

        <!-- LOGIN FORM -->
        <form id="login-form">
            <div class="form-group">
                <label>Email Address</label>
                <div class="input-wrapper">
                    <i class="fa-solid fa-envelope"></i>
                    <input type="email" id="login-email" placeholder="name@example.com" required>
                </div>
            </div>
            <div class="form-group">
                <label>Secure Password</label>
                <div class="input-wrapper">
                    <i class="fa-solid fa-lock"></i>
                    <input type="password" id="login-pass" placeholder="••••••••" required>
                </div>
                <a href="#" class="forgot-link" id="btn-forgot-pass">Forgot Password?</a>
            </div>
            <button type="submit" class="auth-btn">CONTINUE TO WORKSPACE</button>
        </form>

        <!-- SIGNUP FORM -->
        <form id="signup-form" style="display:none;">
            <div class="form-group">
                <label>Full Name</label>
                <div class="input-wrapper">
                    <i class="fa-solid fa-user"></i>
                    <input type="text" id="signup-name" placeholder="Enter your name" required>
                </div>
            </div>
            <div class="form-group">
                <label>Contact Details</label>
                <div class="input-wrapper" style="margin-bottom:12px;">
                    <i class="fa-solid fa-envelope"></i>
                    <input type="email" id="signup-email" placeholder="email@example.com" required>
                </div>
                <div style="display:flex; gap:10px;">
                    <div class="input-wrapper" style="width:100px;">
                        <i class="fa-solid fa-globe" style="left:12px;"></i>
                        <input type="text" id="signup-country" placeholder="+92" style="padding-left:38px;" required>
                    </div>
                    <div class="input-wrapper" style="flex:1;">
                        <i class="fa-solid fa-phone"></i>
                        <input type="text" id="signup-phone" placeholder="Cell Number" required>
                    </div>
                </div>
            </div>
            <div class="form-group">
                <label>Verification</label>
                <div class="input-wrapper" style="margin-bottom:12px;">
                    <i class="fa-solid fa-calendar-day"></i>
                    <input type="date" id="signup-dob" required>
                </div>
                <div class="anti-bot-box">
                    <div style="font-size:0.75rem; color:var(--accent); font-weight:700; margin-bottom:8px; display:flex; align-items:center; gap:8px;">
                        <i class="fa-solid fa-shield-halved"></i> BOT PROTECTION
                    </div>
                    <div style="display:flex; justify-content:space-between; align-items:center;">
                        <span style="font-size:0.9rem; font-weight:600;">Solve: 4 + 7 = ?</span>
                        <input type="number" id="bot-shield-val" placeholder="Result" style="width:80px; background:rgba(255,255,255,0.05); border:1px solid rgba(0,229,255,0.2); border-radius:10px; padding:10px; color:#fff; text-align:center;" required>
                    </div>
                </div>
            </div>
            <div class="form-group">
                <label>Select Your Plan</label>
                <div class="input-wrapper">
                    <i class="fa-solid fa-crown"></i>
                    <select id="signup-plan" style="padding-left:52px; appearance:none;">
                        <!-- Dynamically Loaded -->
                    </select>
                </div>
            </div>
            <div class="form-group">
                <label>Choose Password</label>
                <div class="input-wrapper">
                    <i class="fa-solid fa-lock"></i>
                    <input type="password" id="signup-pass" placeholder="Min. 8 characters" required>
                </div>
            </div>
            
            <div class="terms-row">
                <input type="checkbox" id="signup-agree" required>
                <label for="signup-agree">
                    I agree to the <span>Service Agreement</span> and <span>License Policy</span>. I confirm that I am at least 18 years old.
                </label>
            </div>

            <button type="submit" class="auth-btn">FINALIZE ENROLLMENT</button>
        </form>

        <!-- FORGOT AREA -->
        <div id="forgot-area" style="display:none; text-align:center;">
             <h3 style="margin-bottom:12px;">Secure Recovery</h3>
             <p style="color:rgba(255,255,255,0.5); font-size:0.9rem; margin-bottom:32px;">Enter your registered email to receive a recovery token.</p>
             <div class="form-group">
                <div class="input-wrapper">
                    <i class="fa-solid fa-envelope"></i>
                    <input type="email" id="forgot-email" placeholder="Your Email address">
                </div>
             </div>
             <button class="auth-btn" id="btn-send-reset">SEND RECOVERY KEY</button>
             <a href="#" class="forgot-link" style="text-align:center; margin-top:24px;" id="back-to-login">← Back to Secure Login</a>
        </div>
    </div>

    <script src="admin.js"></script>
    <script>
        const loginTab = document.getElementById('tab-login-btn');
        const signupTab = document.getElementById('tab-signup-btn');
        const forgotArea = document.getElementById('forgot-area');

        loginTab.onclick = () => {
            loginTab.classList.add('active');
            signupTab.classList.remove('active');
            document.getElementById('login-form').style.display = 'block';
            document.getElementById('signup-form').style.display = 'none';
            forgotArea.style.display = 'none';
        }

        signupTab.onclick = () => {
            signupTab.classList.add('active');
            loginTab.classList.remove('active');
            document.getElementById('signup-form').style.display = 'block';
            document.getElementById('login-form').style.display = 'none';
            forgotArea.style.display = 'none';
        }

        document.getElementById('btn-forgot-pass').onclick = (e) => {
            e.preventDefault();
            document.getElementById('login-form').style.display = 'none';
            forgotArea.style.display = 'block';
        }

        document.getElementById('back-to-login').onclick = (e) => {
            e.preventDefault();
            forgotArea.style.display = 'none';
            document.getElementById('login-form').style.display = 'block';
        }

        function loadSignupPlans() {
            const plans = JSON.parse(localStorage.getItem('helper_fee_plans') || '[]');
            const select = document.getElementById('signup-plan');
            if (select) {
                const publicPlans = plans.filter(p => !p.hidden);
                select.innerHTML = publicPlans.map(p => `
                    <option value="${p.id}">${p.name.toUpperCase()} — ${p.price} PKR (${p.days === -1 ? 'LIFETIME' : p.days + ' DAYS'})</option>
                `).join('');
                
                const urlParams = new URLSearchParams(window.location.search);
                if (urlParams.get('trial') === 'true') {
                    signupTab.click();
                    const trialPlan = publicPlans.find(p => p.id.includes('trial'));
                    if (trialPlan) select.value = trialPlan.id;
                }
            }
        }
        document.addEventListener('DOMContentLoaded', loadSignupPlans);
    </script>
</body>
</html>
